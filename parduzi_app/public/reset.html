<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reinitialisation du mot de passe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0a91a9;
            color: white;
            font-weight: bold;
        }
        .status {
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reinitialiser le mot de passe</h2>
        <p>Entrez un nouveau mot de passe.</p>
        <label>Nouveau mot de passe</label>
        <input type="password" id="newPassword" placeholder="8+ caracteres, Maj, Min, Chiffre, Special" />
        <button id="btnReset">Valider</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';

        document.getElementById('btnReset').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            statusEl.textContent = '';

            if (!token || !newPassword) {
                statusEl.textContent = 'Token manquant ou mot de passe vide.';
                return;
            }

            try {
                const res = await fetch('/api/auth/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    statusEl.textContent = 'Mot de passe mis a jour. Vous pouvez vous connecter.';
                } else {
                    statusEl.textContent = data.error || 'Erreur lors de la reinitialisation.';
                }
            } catch (e) {
                statusEl.textContent = 'Erreur reseau.';
            }
        });
    </script>
</body>
</html>
